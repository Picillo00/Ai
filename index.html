<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#000000">
<title>HUD Voice Assistant</title>
<style>
  :root {
    --bg: #000000;
    --text: #ffffff;
    --dim: #888888;
    --accent: #39ff14; /* Verde neon per HUD */
    --listening: #ff3b3b; /* Rosso quando ascolta */
  }
  
  * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
  
  body, html {
    margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden; touch-action: none;
  }

  #wrap {
    display: flex; flex-direction: column; height: 100%; padding: 20px;
    justify-content: space-between; align-items: center;
  }

  #status-bar {
    font-size: 12px; font-weight: bold; color: var(--dim); letter-spacing: 2px;
    display: flex; align-items: center; gap: 8px;
  }
  
  /* Pallino di stato pulsante */
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); }
  .state-listening .dot { background: var(--listening); animation: pulse 1s infinite; }
  .state-thinking .dot { background: #00e5ff; animation: pulse 1s infinite; }
  .state-ready .dot { background: var(--accent); }

  /* Contenitore testo Risposta */
  #display-box {
    flex-grow: 1; display: flex; flex-direction: column; justify-content: center;
    width: 100%; max-width: 500px; padding: 10px;
  }

  #user-prompt {
    font-size: 14px; color: var(--accent); font-style: italic; margin-bottom: 12px;
    min-height: 20px; text-align: left;
  }

  #ai-response {
    font-size: 18px; line-height: 1.4; text-align: left;
    max-height: 70%; overflow-y: auto; color: #f0f0f0;
  }

  #controls {
    font-size: 11px; color: var(--dim); text-align: center;
  }

  @keyframes pulse {
    0% { transform: scale(0.9); opacity: 0.6; }
    50% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(0.9); opacity: 0.6; }
  }

  /* Ottimizzazione display Ray-Ban */
  @media (max-height: 360px) {
    #ai-response { font-size: 15px; line-height: 1.3; }
    #user-prompt { font-size: 12px; margin-bottom: 6px; }
  }
</style>
</head>
<body>

<div id="wrap">
  <div id="status-bar" class="state-ready">
    <div class="dot"></div>
    <span id="status-text">PRONTO</span>
  </div>

  <div id="display-box">
    <div id="user-prompt">Fai doppio click per parlare...</div>
    <div id="ai-response">Ciao! Sono la tua IA ad attivazione vocale. Fai un doppio pinch sul bracciale, fai una domanda e io ti risponderò direttamente sull'HUD.</div>
  </div>

  <div id="controls">
    <b>Doppio Pinch:</b> Parla / Fai nuova domanda
  </div>
</div>

<script>
(() => {
  const statusBar = document.getElementById('status-bar');
  const statusText = document.getElementById('status-text');
  const userPrompt = document.getElementById('user-prompt');
  const aiResponse = document.getElementById('ai-response');

  let recognition;
  let isListening = false;

  // 1. Configura il Riconoscimento Vocale di Google/Apple integrato nel browser
  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'it-IT'; // Lingua italiana
    recognition.continuous = false; // Si ferma appena smetti di parlare
    recognition.interimResults = false; // Vuole solo il risultato finale completo

    recognition.onstart = () => {
      isListening = true;
      statusBar.className = 'state-listening';
      statusText.textContent = 'ASCOLTO...';
      userPrompt.textContent = 'Ti ascolto, parla ora...';
    };

    recognition.onerror = (e) => {
      console.error(e);
      resetToReady('Errore Microfono');
    };

    recognition.onend = () => {
      isListening = false;
    };

    // Quando smetti di parlare, prende il testo e lo manda all'IA
    recognition.onresult = (event) => {
      const textSpoken = event.results[0][0].transcript;
      userPrompt.textContent = `"${textSpoken}"`;
      askAI(textSpoken);
    };
  } else {
    userPrompt.textContent = "Errore: Riconoscimento vocale non supportato da questo browser.";
  }

  // 2. Funzione per mandare il testo all'Intelligenza Artificiale pubblica
  async function askAI(promptText) {
    statusBar.className = 'state-thinking';
    statusText.textContent = 'RICERCA IA...';
    aiResponse.textContent = 'Sto pensando...';

    try {
      // Usiamo un endpoint pubblico e gratuito (DuckDuckGo AI proxy libero)
      // Nota per sviluppatori: Risposte ottimizzate e corte per display HUD
      const response = await fetch('https://text.pollinations.ai/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          messages: [
            { role: 'system', content: 'Sei un assistente per occhiali HUD. Dai risposte brevissime, massimo 2 frasi, dritte al punto.' },
            { role: 'user', content: promptText }
          ]
        })
      });

      const reply = await response.text();
      aiResponse.textContent = reply;
      resetToReady('PRONTO');

    } catch (error) {
      aiResponse.textContent = "Errore di connessione con l'IA. Riprova.";
      resetToReady('ERRORE');
    }
  }

  function resetToReady(label) {
    statusBar.className = 'state-ready';
    statusText.textContent = label;
  }

  function toggleListening() {
    if (!recognition) return;
    if (isListening) {
      recognition.stop();
    } else {
      // Richiede l'attivazione del microfono
      recognition.start();
    }
  }

  // --- CONTROLLO BRACCIALE (Doppio Click / Pinch) ---
  let lastClickTime = 0;
  const DOUBLE_DELAY = 300;

  document.addEventListener('pointerup', (e) => {
    const now = Date.now();
    if (now - lastClickTime < DOUBLE_DELAY) {
      // DOPPIO CLICK RILEVATO -> Attiva/Interrompe l'ascolto vocale
      lastClickTime = 0;
      toggleListening();
      if(e) e.preventDefault();
      return;
    }
    lastClickTime = now;
  });

  // Tasto Spazio su PC per testare comodamente da desktop
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      toggleListening();
    }
  });

})();
</script>
</body>
</html>
