<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>HUD Tilt-Writer</title>
<style>
  body { background: #000; color: #fff; font-family: monospace; overflow: hidden; margin: 0; }
  #wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
  
  /* Reticolo di selezione (Ruota) */
  #wheel { width: 200px; height: 200px; border-radius: 50%; border: 2px solid #333; position: relative; display: flex; align-items: center; justify-content: center; }
  .sector { position: absolute; width: 50%; height: 50%; transform-origin: bottom right; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
  
  /* Quadranti */
  #s0 { transform: rotate(-45deg) skewX(-45deg); background: #111; } /* UP */
  #s1 { transform: rotate(45deg) skewX(-45deg); background: #111; }  /* RIGHT */
  #s2 { transform: rotate(135deg) skewX(-45deg); background: #111; } /* DOWN */
  #s3 { transform: rotate(225deg) skewX(-45deg); background: #111; } /* LEFT */
  
  .active { background: #39ff14 !important; color: #000; }
  #preview { margin-bottom: 20px; font-size: 24px; color: #00e5ff; }
</style>
</head>
<body>

<div id="wrap">
  <div id="preview">_</div>
  <div id="wheel">
    <div class="sector" id="s0" style="top:0; left:0;">A-F</div>
    <div class="sector" id="s1" style="top:0; left:50%;">G-L</div>
    <div class="sector" id="s2" style="top:50%; left:50%;">M-R</div>
    <div class="sector" id="s3" style="top:50%; left:0;">S-Z</div>
  </div>
</div>

<script>
  let currentSelection = -1;
  const preview = document.getElementById('preview');

  // Ascolta il giroscopio (Tilt)
  window.addEventListener('deviceorientation', (event) => {
    // Gamma: tilt dx/sx | Beta: tilt avanti/indietro
    const gamma = event.gamma; 
    const beta = event.beta;

    // Logica semplice: dividiamo la zona di tilt in 4
    if (beta < -20) currentSelection = 0;      // Tilt avanti (UP)
    else if (gamma > 20) currentSelection = 1; // Tilt destra (RIGHT)
    else if (beta > 20) currentSelection = 2;  // Tilt indietro (DOWN)
    else if (gamma < -20) currentSelection = 3; // Tilt sinistra (LEFT)
    else currentSelection = -1;

    updateUI();
  });

  function updateUI() {
    document.querySelectorAll('.sector').forEach((el, i) => {
      el.classList.toggle('active', i === currentSelection);
    });
  }

  // Simula il pinch (Click)
  window.addEventListener('pointerdown', () => {
    if (currentSelection !== -1) {
      preview.textContent += ["A", "G", "M", "S"][currentSelection]; // Esempio logica
    }
  });

  // Richiesta permessi (necessaria su molti browser mobile/HUD)
  document.body.onclick = () => {
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission();
    }
  };
</script>
</body>
</html>
