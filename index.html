<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#000000">
<title>HUD AI - Telepathy Mode</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
  body { background-color: #020205; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 12px; overflow: hidden; user-select: none; }
  
  .chat-container { 
    background: #05050a; width: 100%; max-width: 360px; height: 92vh; 
    border-radius: 24px; padding: 14px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.9); 
    border: 2px solid #0b0b14; display: flex; flex-direction: column; justify-content: space-between; 
  }
  
  #status-bar { font-size: 11px; font-weight: bold; color: #00ffaa; letter-spacing: 2px; display: flex; align-items: center; gap: 6px; padding-bottom: 8px; border-bottom: 1px solid #1a1a26; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #00ffaa; }
  .state-thinking .dot { background: #f4b400; animation: pulse 1s infinite; }
  
  #display-box { flex-grow: 1; display: flex; flex-direction: column; gap: 10px; padding: 10px 0; overflow-y: auto; scroll-behavior: smooth; }
  #display-box::-webkit-scrollbar { display: none; }
  
  .bubble { max-width: 85%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.35; animation: fadeIn 0.2s ease forwards; word-wrap: break-word; }
  .bubble.user { align-self: flex-end; background: rgba(0, 255, 170, 0.08); border: 1px solid #00ffaa; color: #00ffaa; border-bottom-right-radius: 4px; }
  .bubble.ai { align-self: flex-start; background: rgba(0, 229, 255, 0.05); border: 1px solid rgba(0, 229, 255, 0.4); color: #f0f0f0; border-bottom-left-radius: 4px; }
  .bubble.ai strong { color: #00e5ff; }

  /* ZONA MATRICE E PREVISIONE */
  .neural-matrix-zone {
    background: #07070f; border: 1px solid #141426; border-radius: 18px; padding: 8px; display: flex; flex-direction: column; gap: 8px;
  }
  #text-preview-container {
    min-height: 38px; border-bottom: 1px dashed #222; padding-bottom: 4px; display: flex; flex-wrap: wrap; align-items: center;
  }
  #text-preview { font-size: 16px; color: #ffffff; font-weight: bold; }
  #text-suggestion { font-size: 16px; color: #555555; font-style: italic; margin-left: 2px; }

  .matrix-grid { display: flex; flex-direction: column; gap: 4px; }
  .matrix-row { display: flex; gap: 4px; padding: 2px; border-radius: 6px; transition: all 0.15s ease; }
  .matrix-row.row-focused { background: rgba(0, 255, 170, 0.08); border: 1px dashed rgba(0, 255, 170, 0.4); }
  .matrix-cell { flex: 1; text-align: center; padding: 6px 2px; font-size: 12px; font-weight: bold; color: #444466; background: #0c0c17; border-radius: 4px; transition: all 0.1s ease; white-space: nowrap; overflow: hidden; }
  .matrix-row.row-focused .matrix-cell { color: #88aaff; }
  .matrix-cell.cell-focused { background: #00ffaa !important; color: #000000 !important; font-size: 14px; transform: scale(1.08); box-shadow: 0 0 10px #00ffaa; }
  
  .macro-cell { color: #f4b400; font-size: 10px; }
  .fn-cell { color: #ff3b3b; }

  @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.6; } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="chat-container">
  <div id="status-bar" class="state-ready">
    <div class="dot"></div>
    <span id="status-text">SCELTA RIGA</span>
  </div>

  <div id="display-box">
    <div class="bubble ai"><strong>IA:</strong> Modalità Telepatia. Scrivi 2 lettere di un concetto e usa "COMPLETA". Ti darò i fatti salienti in tempo reale.</div>
  </div>

  <div class="neural-matrix-zone">
    <div id="text-preview-container">
      <span id="text-preview"></span>
      <span id="text-suggestion"></span>
    </div>
    <div class="matrix-grid" id="grid-container"></div>
  </div>
</div>

<script>
  const displayBox = document.getElementById('display-box');
  const statusBar = document.getElementById('status-bar');
  const statusText = document.getElementById('status-text');
  const textPreview = document.getElementById('text-preview');
  const textSuggestion = document.getElementById('text-suggestion');
  const gridContainer = document.getElementById('grid-container');
  
  let isThinking = false;
  let chatHistory = [];
  let currentText = "";
  let currentPrediction = "";

  // Riga 0: La prima cella "💡 COMPLETA" è magica. Applica il suggerimento.
  const matrix = [
    ["💡 COMPLETA", "CHI?", "COSA?", "QUANDO?", "METEO", " "],
    ["E", "A", "I", "O", "U", "C"],
    ["L", "N", "R", "S", "T", "D"],
    ["P", "M", "V", "G", "B", "F"],
    ["H", "Q", "Z", "X", "Y", "K"],
    ["J", "?", "W", "⌫ CANC", "🚀 INVIA", "🧹 PULISCI"]
  ];

  let currentRow = 0;
  let currentCol = -1;

  function renderMatrix() {
    gridContainer.innerHTML = "";
    matrix.forEach((rowData, rIdx) => {
      const rowDiv = document.createElement('div');
      rowDiv.className = `matrix-row ${rIdx === currentRow ? 'row-focused' : ''}`;
      
      rowData.forEach((cellData, cIdx) => {
        const cellDiv = document.createElement('div');
        cellDiv.className = 'matrix-cell';
        
        if (rIdx === 0) cellDiv.classList.add('macro-cell');
        if (cellData.includes('⌫') || cellData.includes('🚀') || cellData.includes('🧹')) cellDiv.classList.add('fn-cell');
        if (rIdx === currentRow && cIdx === currentCol) cellDiv.classList.add('cell-focused');
        
        cellDiv.textContent = cellData === " " ? "␣" : cellData;
        rowDiv.appendChild(cellDiv);
      });
      gridContainer.appendChild(rowDiv);
    });
  }

  // Motore di Autocompletamento LIVE (Usa API Wikipedia senza Backend)
  async function fetchPrediction(text) {
    if (text.length < 2) { 
      currentPrediction = ""; 
      textSuggestion.textContent = ""; 
      return; 
    }
    try {
      const url = `https://it.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(text)}&limit=1&format=json&origin=*`;
      const response = await fetch(url);
      const data = await response.json();
      if (data[1] && data[1].length > 0) {
        const suggestion = data[1][0];
        // Se la parola suggerita inizia con le lettere digitate, mostra solo il resto
        if (suggestion.toLowerCase().startsWith(text.toLowerCase())) {
          currentPrediction = suggestion;
          textSuggestion.textContent = suggestion.substring(text.length);
        } else {
          currentPrediction = suggestion;
          textSuggestion.textContent = " -> " + suggestion;
        }
      } else {
        currentPrediction = "";
        textSuggestion.textContent = "";
      }
    } catch (e) { console.log(e); }
  }

  function updatePreview() {
    textPreview.textContent = currentText;
    if (currentText === "") {
      textSuggestion.textContent = "Inizia a digitare...";
    } else {
      fetchPrediction(currentText);
    }
  }

  window.addEventListener('keydown', (e) => {
    if (isThinking) return;

    if (e.key === "ArrowUp" || e.key === "ArrowDown") {
      currentCol = -1;
      statusText.textContent = "SCELTA RIGA";
      renderMatrix();
      return;
    }

    if (currentCol === -1) {
      if (e.key === "ArrowLeft") currentRow = (currentRow - 1 + matrix.length) % matrix.length;
      else if (e.key === "ArrowRight") currentRow = (currentRow + 1) % matrix.length;
      else if (e.key === "Enter") { currentCol = 0; statusText.textContent = "SCELTA LETTERA"; }
      renderMatrix();
    } else {
      if (e.key === "ArrowLeft") currentCol = (currentCol - 1 + matrix[currentRow].length) % matrix[currentRow].length;
      else if (e.key === "ArrowRight") currentCol = (currentCol + 1) % matrix[currentRow].length;
      else if (e.key === "Enter") {
        const val = matrix[currentRow][currentCol];
        
        if (val === "💡 COMPLETA") {
          if (currentPrediction !== "") {
            currentText = currentPrediction;
            currentPrediction = "";
          }
        } else if (val === "⌫ CANC") {
          currentText = currentText.slice(0, -1);
        } else if (val === "🧹 PULISCI") {
          currentText = "";
          currentPrediction = "";
        } else if (val === "🚀 INVIA") {
          if (currentText.trim() !== "") {
            sendToAI(currentText);
            currentText = "";
            currentPrediction = "";
          }
        } else {
          currentText += val === "CHI?" || val === "COSA?" || val === "QUANDO?" || val === "METEO" ? val + " " : val;
        }
        
        updatePreview();
        currentCol = -1;
        statusText.textContent = "SCELTA RIGA";
        renderMatrix();
      }
    }
  });

  renderMatrix();
  updatePreview();

  function appendBubble(sender, text) {
    chatHistory.push({ sender: sender, text: text });
    const bubble = document.createElement('div');
    bubble.className = `bubble ${sender}`;
    bubble.innerHTML = sender === 'user' ? `[Key]: ${text}` : `<strong>IA:</strong> ${text}`;
    displayBox.appendChild(bubble);
    setTimeout(() => { displayBox.scrollTop = displayBox.scrollHeight; }, 50);
  }

  // NUOVO SYSTEM PROMPT AGGRESSIVO PER RISPOSTE "SNIPER"
  async function sendToAI(promptText) {
    isThinking = true;
    statusBar.className = "state-thinking";
    statusText.textContent = "ANALISI CONCETTO...";
    appendBubble('user', promptText);

    // Istruzioni ferree per l'IA: deve dedurre la domanda dalla parola chiave
    const systemPrompt = "Sei un suggeritore in incognito per un utente impegnato in una conversazione dal vivo. L'utente ha un bracciale neurale e può inviarti solo 1 o 2 parole chiave (es: 'Aristotele' o 'Pil Italia'). Il tuo compito è dedurre di cosa ha bisogno e fornirgli i fatti salienti, definizioni o dati aggiornati istantaneamente. Sii spietatamente conciso: usa elenchi puntati o frasi cortissime. Zero convenevoli. Usa la ricerca web. Lingua italiana.";
    
    try {
      const url = `https://text.pollinations.ai/${encodeURIComponent(promptText)}?search=true&model=openai&system=${encodeURIComponent(systemPrompt)}`;
      const response = await fetch(url);
      let reply = (await response.text()).trim();

      if (reply.startsWith('{')) {
        try { const j = JSON.parse(reply); if(j.content) reply = j.content; } catch(e){}
      }
      appendBubble('ai', reply);
    } catch (e) {
      appendBubble('ai', 'Rete instabile.');
    }

    isThinking = false;
    statusBar.className = "state-ready";
    statusText.textContent = "SCELTA RIGA";
  }
</script>
</body>
</html>
