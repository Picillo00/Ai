<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#000000">
<title>HUD WhatsApp Tree Chat</title>
<style>
  :root {
    --bg: #000000;
    --text: #ffffff;
    --dim: #555555;
    --user-color: #39ff14; /* Verde WhatsApp / Neon */
    --ai-color: #00e5ff;   /* Ciano */
  }
  
  * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
  
  body, html {
    margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden; touch-action: none;
  }

  #wrap { display: flex; flex-direction: column; height: 100%; padding: 12px; justify-content: space-between; }

  /* Header fisso in alto */
  #status-bar {
    font-size: 11px; font-weight: bold; color: var(--dim); letter-spacing: 2px;
    display: flex; align-items: center; gap: 6px; padding-bottom: 6px;
    border-bottom: 1px solid #111; z-index: 10; background: var(--bg);
  }
  
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); }
  .state-thinking .dot { background: #f4b400; animation: pulse 1s infinite; }
  .state-ready .dot { background: var(--user-color); }

  /* Area Chat vertical list style WhatsApp */
  #display-box { flex-grow: 1; display: flex; flex-direction: column; gap: 12px; padding: 10px 0; overflow-y: scroll; scroll-behavior: smooth; }
  #display-box::-webkit-scrollbar { display: none; }
  .chat-scrolling #display-box { background: rgba(0, 229, 255, 0.02); }

  /* Bolle della Chat */
  .bubble { max-width: 85%; padding: 10px 14px; border-radius: 16px; font-size: 16px; line-height: 1.35; animation: fadeIn 0.2s ease forwards; word-wrap: break-word; }
  .bubble.user { align-self: flex-end; background: rgba(57, 255, 20, 0.08); border: 1px solid var(--user-color); color: var(--user-color); border-bottom-right-radius: 4px; font-style: italic; }
  .bubble.ai { align-self: flex-start; background: rgba(0, 229, 255, 0.05); border: 1px solid rgba(0, 229, 255, 0.4); color: #f0f0f0; border-bottom-left-radius: 4px; }
  .bubble.ai strong { color: var(--ai-color); }

  /* ZONA TASTIERA AD ALBERO DECISIONALE */
  .neural-matrix-zone { background: #050508; border: 1px solid #111; border-radius: 16px; padding: 8px; display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
  .chat-scrolling .neural-matrix-zone { opacity: 0.2; }

  #text-preview-container { min-height: 32px; border-bottom: 1px dashed #222; padding-bottom: 4px; display: flex; flex-wrap: wrap; align-items: center; }
  #text-preview { font-size: 15px; color: #ffffff; font-weight: bold; }
  #text-suggestion { font-size: 15px; color: var(--dim); font-style: italic; margin-left: 2px; }

  .matrix-grid { display: flex; flex-direction: column; gap: 4px; }
  .matrix-row { display: flex; gap: 4px; padding: 1px; }
  .matrix-cell { flex: 1; text-align: center; padding: 7px 2px; font-size: 12px; font-weight: bold; color: #444455; background: #08080f; border-radius: 6px; border: 1px solid #111; transition: all 0.1s ease; white-space: nowrap; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 34px; }
  
  /* Focus Cella Stile HUD Neon */
  .matrix-cell.cell-focused { background: var(--user-color) !important; color: #000000 !important; font-size: 13px; transform: scale(1.03); box-shadow: 0 0 12px var(--user-color); border-color: var(--user-color); }
  
  .action-cell { color: var(--ai-color); }
  .fn-cell { color: #ff3b3b; }
  .skip-cell { color: #f4b400; }

  @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.6; } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div id="wrap">
  <div id="status-bar" class="state-ready">
    <div class="dot"></div>
    <span id="status-text">1. SCEGLI AVVIO</span>
  </div>

  <div id="display-box">
    <div class="bubble ai"><strong>IA:</strong> Sistema ad Albero attivo. Costruisci la frase muovendoti liberamente (Su/Giù/Sx/Dx). Sali oltre la prima riga per rileggere la chat.</div>
  </div>

  <div class="neural-matrix-zone">
    <div id="text-preview-container">
      <span id="text-preview"></span>
      <span id="text-suggestion"></span>
    </div>
    <div class="matrix-grid" id="grid-container"></div>
  </div>
</div>

<script>
(() => {
  const mainContainer = document.getElementById('wrap');
  const statusBar = document.getElementById('status-bar');
  const statusText = document.getElementById('status-text');
  const displayBox = document.getElementById('display-box');
  const textPreview = document.getElementById('text-preview');
  const textSuggestion = document.getElementById('text-suggestion');
  const gridContainer = document.getElementById('grid-container');

  let isThinking = false; 
  let chatHistory = []; 
  let requestQueue = []; 
  let currentText = "";
  let currentPrediction = "";
  let chatFocus = false;

  // Stato Albero Decisionale: 'STARTERS' -> 'ARTICLES' -> 'KEYBOARD'
  let uiState = 'STARTERS';

  const startersMatrix = [
    ["COS'È", "QUAL È", "CHI È"],
    ["DOV'È", "DOVE SONO", "COME"],
    ["PERCHÉ", "QUANDO", "QUANTO"],
    ["📰 NEWS SU", "☀️ METEO", "⌨️ TASTIERA DIRETTA"]
  ];

  const articlesMatrix = [
    ["IL", "LO", "LA"],
    ["I", "GLI", "LE"],
    ["UN", "UNO", "UNA"],
    ["⌫ ANNULLA", "⏩ SALTA ARTICOLO"]
  ];

  const keyboardMatrix = [
    ["💡 COMPLETA", "⌫ CANC", "🧹 RESET", "🚀 INVIA"],
    ["E", "A", "I", "O", "U", "C"],
    ["L", "N", "R", "S", "T", "D"],
    ["P", "M", "V", "G", "B", "F"],
    ["H", "Q", "Z", "X", "Y", "K"],
    ["J", "?", "W", " ", " ", " "]
  ];

  let currentRow = 0;
  let currentCol = 0;

  function getActiveMatrix() {
    if (uiState === 'STARTERS') return startersMatrix;
    if (uiState === 'ARTICLES') return articlesMatrix;
    return keyboardMatrix;
  }

  function renderMatrix() {
    const matrix = getActiveMatrix();
    gridContainer.innerHTML = "";
    matrix.forEach((rowData, rIdx) => {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'matrix-row';
      
      rowData.forEach((cellData, cIdx) => {
        const cellDiv = document.createElement('div');
        cellDiv.className = 'matrix-cell';
        
        if (cellData.includes('⌨️') || cellData.includes('💡')) cellDiv.classList.add('action-cell');
        if (cellData.includes('⌫') || cellData.includes('🚀') || cellData.includes('🧹')) cellDiv.classList.add('fn-cell');
        if (cellData.includes('⏩')) cellDiv.classList.add('skip-cell');
        
        if (!chatFocus && rIdx === currentRow && cIdx === currentCol) {
          cellDiv.classList.add('cell-focused');
        }
        
        cellDiv.textContent = cellData === " " ? "␣" : cellData;
        rowDiv.appendChild(cellDiv);
      });
      gridContainer.appendChild(rowDiv);
    });
  }

  async function fetchPrediction(text) {
    const words = text.trim().split(" ");
    const lastWord = words[words.length - 1];

    if (uiState !== 'KEYBOARD' || lastWord.length < 2) { 
      currentPrediction = ""; textSuggestion.textContent = ""; return; 
    }
    
    try {
      const url = `https://it.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(lastWord)}&limit=1&format=json&origin=*`;
      const response = await fetch(url);
      const data = await response.json();
      if (data[1] && data[1].length > 0) {
        const suggestion = data[1][0];
        if (suggestion.toLowerCase().startsWith(lastWord.toLowerCase())) {
          currentPrediction = suggestion.substring(lastWord.length);
          textSuggestion.textContent = currentPrediction;
        } else {
          currentPrediction = suggestion;
          textSuggestion.textContent = " -> " + suggestion;
        }
      } else { currentPrediction = ""; textSuggestion.textContent = ""; }
    } catch (e) {}
  }

  function updatePreview() {
    textPreview.textContent = currentText;
    if (currentText === "") {
      textSuggestion.textContent = uiState === 'STARTERS' ? "Scegli blocco iniziale..." : "";
    } else {
      fetchPrediction(currentText);
    }
  }

  function switchState(newState) {
    uiState = newState;
    currentRow = 0;
    currentCol = 0;
    
    if (newState === 'STARTERS') statusText.textContent = "1. SCEGLI AVVIO";
    if (newState === 'ARTICLES') statusText.textContent = "2. SCEGLI ARTICOLO";
    if (newState === 'KEYBOARD') statusText.textContent = "3. DIGITA ARGOMENTO";
    
    renderMatrix();
    updatePreview();
  }

  // LOGICA DI NAVIGAZIONE D-PAD CONTINUA 4 DIREZIONI
  window.addEventListener('keydown', (e) => {
    const matrix = getActiveMatrix();

    if (chatFocus) {
      if (e.key === "ArrowUp") { displayBox.scrollTop -= 60; } 
      else if (e.key === "ArrowDown") {
        const oldScroll = displayBox.scrollTop;
        displayBox.scrollTop += 60; 
        if (displayBox.scrollTop === oldScroll || (displayBox.scrollHeight - displayBox.scrollTop <= displayBox.clientHeight + 10)) {
          chatFocus = false;
          mainContainer.classList.remove('chat-scrolling');
          switchState(uiState); 
        }
      }
      renderMatrix();
      return;
    }

    if (e.key === "ArrowLeft") { currentCol = (currentCol - 1 + matrix[currentRow].length) % matrix[currentRow].length; } 
    else if (e.key === "ArrowRight") { currentCol = (currentCol + 1) % matrix[currentRow].length; } 
    else if (e.key === "ArrowUp") {
      currentRow--;
      if (currentRow < 0) { 
        currentRow = 0;
        chatFocus = true; 
        mainContainer.classList.add('chat-scrolling'); 
        statusText.textContent = "CRONOLOGIA MESSAGGI"; 
      }
    } 
    else if (e.key === "ArrowDown") { if (currentRow < matrix.length - 1) { currentRow++; } } 
    
    else if (e.key === "Enter") {
      const val = matrix[currentRow][currentCol];
      
      // FASE 1: AVVIO
      if (uiState === 'STARTERS') {
        if (val === "⌨️ TASTIERA DIRETTA") { currentText = ""; switchState('KEYBOARD'); } 
        else { currentText = val + " "; switchState('ARTICLES'); }
      }
      // FASE 2: ARTICOLI
      else if (uiState === 'ARTICLES') {
        if (val === "⌫ ANNULLA") { currentText = ""; switchState('STARTERS'); } 
        else if (val === "⏩ SALTA ARTICOLO") { switchState('KEYBOARD'); } 
        else { currentText += val.toLowerCase() + " "; switchState('KEYBOARD'); }
      }
      // FASE 3: DETTAGLIO TASTIERA
      else if (uiState === 'KEYBOARD') {
        if (val === "💡 COMPLETA") {
          if (currentPrediction !== "") { 
            if (currentPrediction.includes("->")) currentText = currentText.substring(0, currentText.lastIndexOf(" ") + 1) + currentPrediction.replace(" -> ", "");
            else currentText += currentPrediction; 
            currentPrediction = ""; 
          }
        } else if (val === "⌫ CANC") {
          currentText = currentText.slice(0, -1);
          if (currentText.trim() === "") switchState('STARTERS');
        } else if (val === "🧹 RESET") {
          currentText = ""; currentPrediction = ""; switchState('STARTERS');
        } else if (val === "🚀 INVIA") {
          if (currentText.trim() !== "") { 
            appendBubble('user', currentText.trim());
            pushToQueue(currentText.trim()); 
            currentText = ""; currentPrediction = "";
            switchState('STARTERS'); 
          }
        } else {
          currentText += val;
        }
      }
      updatePreview();
    }
    renderMatrix();
  });

  function appendBubble(sender, text) {
    chatHistory.push({ sender: sender, text: text });
    const bubble = document.createElement('div');
    bubble.className = `bubble ${sender}`;
    bubble.innerHTML = sender === 'user' ? text : `<strong>IA:</strong> ${text}`;
    displayBox.appendChild(bubble);
    setTimeout(() => { if (!chatFocus) displayBox.scrollTop = displayBox.scrollHeight; }, 50);
    resetStatus();
  }

  // GESTIONE CODA INTELLIGENTE PRESA DAL TUO CODICE BASE
  function pushToQueue(promptText) {
    requestQueue.push(promptText);
    if (!isThinking) { processNextQueueItem(); } 
    else { updateStatusDisplay(`IN CODA [${requestQueue.length}]`); }
  }

  async function processNextQueueItem() {
    if (requestQueue.length === 0) { isThinking = false; resetStatus(); return; }

    const nextPrompt = requestQueue.shift();
    if (nextPrompt === "__CANCELLED__") { setTimeout(processNextQueueItem, 50); return; }

    isThinking = true;
    updateStatusDisplay('ELABORAZIONE...');

    // Prompt aggiornato all'anno corrente 2026
    const systemInstruction = 'Sei un assistente HUD per occhiali smart. Ci troviamo nell\'anno 2026. Rispondi in italiano. Sii preciso al 100% sui dati storici, geografici e sportivi. Verifica sempre le informazioni usando la ricerca web attiva (es. restituisci classifiche o dati reali del 2026). Rispondi in massimo due frasi cortissime senza fronzoli. Rispondi SEMPRE e SOLO con testo semplice in italiano. Non restituire MAI codice JSON, reasoning o tool_calls.';
    
    try {
      const url = `https://text.pollinations.ai/${encodeURIComponent(nextPrompt)}?search=true&model=openai&system=${encodeURIComponent(systemInstruction)}`;
      const response = await fetch(url);
      if (!response.ok) throw new Error('Errore di risposta');

      let reply = (await response.text()).trim();
      
      if (reply.startsWith('{') || reply.includes('"reasoning"')) {
         try {
             const jsonObj = JSON.parse(reply);
             if (jsonObj.content) reply = jsonObj.content;
         } catch (e) { reply = "Sto verificando i dati, puoi ripetere?"; }
      }

      appendBubble('ai', reply);
    } catch (error) {
      appendBubble('ai', 'Ricerca in corso troppo complessa. Riprova.');
    }

    setTimeout(processNextQueueItem, 500);
  }

  function updateStatusDisplay(stateText) {
    if (stateText.includes('ELABORAZIONE') || stateText.includes('CODA')) statusBar.className = 'state-thinking';
    else statusBar.className = 'state-ready';
    statusText.textContent = stateText;
  }

  function resetStatus() {
    if (requestQueue.length > 0) updateStatusDisplay(`IN CODA [${requestQueue.length}]`);
    else updateStatusDisplay(uiState === 'STARTERS' ? "1. SCEGLI AVVIO" : uiState === 'ARTICLES' ? "2. SCEGLI ARTICOLO" : "3. DIGITA ARGOMENTO");
  }

  renderMatrix();
  updatePreview();
})();
</script>
</body>
