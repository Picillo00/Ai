<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#000000">
<title>HUD AI - Neural Matrix Keyboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
  body { background-color: #020205; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 12px; overflow: hidden; user-select: none; }
  
  .chat-container { 
    background: #05050a; width: 100%; max-width: 360px; height: 92vh; 
    border-radius: 24px; padding: 14px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.9); 
    border: 2px solid #0b0b14; display: flex; flex-direction: column; justify-content: space-between; 
  }
  
  #status-bar { font-size: 11px; font-weight: bold; color: #00ffaa; letter-spacing: 2px; display: flex; align-items: center; gap: 6px; padding-bottom: 8px; border-bottom: 1px solid #1a1a26; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #00ffaa; }
  .state-thinking .dot { background: #f4b400; animation: pulse 1s infinite; }
  
  #display-box { flex-grow: 1; display: flex; flex-direction: column; gap: 10px; padding: 10px 0; overflow-y: auto; scroll-behavior: smooth; }
  #display-box::-webkit-scrollbar { display: none; }
  
  .bubble { max-width: 85%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.35; animation: fadeIn 0.2s ease forwards; word-wrap: break-word; }
  .bubble.user { align-self: flex-end; background: rgba(0, 255, 170, 0.08); border: 1px solid #00ffaa; color: #00ffaa; border-bottom-right-radius: 4px; }
  .bubble.ai { align-self: flex-start; background: rgba(0, 229, 255, 0.05); border: 1px solid rgba(0, 229, 255, 0.4); color: #f0f0f0; border-bottom-left-radius: 4px; }
  .bubble.ai strong { color: #00e5ff; }

  /* ==========================================
     STRUTTURA TASTIERA A MATRICE HUD
     ========================================== */
  .neural-matrix-zone {
    background: #07070f; border: 1px solid #141426; border-radius: 18px; padding: 8px; display: flex; flex-direction: column; gap: 8px;
  }
  #text-preview {
    font-size: 14px; color: #ffffff; min-height: 38px; max-height: 55px; border-bottom: 1px dashed #222; padding-bottom: 4px; font-style: italic; word-break: break-all; overflow-y: auto;
  }
  #text-preview::-webkit-scrollbar { display: none; }

  .matrix-grid {
    display: flex; flex-direction: column; gap: 4px;
  }
  .matrix-row {
    display: flex; gap: 4px; padding: 2px; border-radius: 6px; transition: all 0.15s ease;
  }
  /* Stato 1: Selezione della Riga */
  .matrix-row.row-focused {
    background: rgba(0, 255, 170, 0.08); border: 1px dashed rgba(0, 255, 170, 0.4);
  }
  .matrix-cell {
    flex: 1; text-align: center; padding: 6px 2px; font-size: 12px; font-weight: bold; color: #444466; background: #0c0c17; border-radius: 4px; transition: all 0.1s ease; white-space: nowrap; overflow: hidden;
  }
  /* La riga è selezionata, ma non abbiamo ancora scelto la lettera */
  .matrix-row.row-focused .matrix-cell {
    color: #88aaff;
  }
  /* Stato 2: Selezione della specifica Lettera/Cella */
  .matrix-cell.cell-focused {
    background: #00ffaa !important; color: #000000 !important; font-size: 14px; transform: scale(1.08); box-shadow: 0 0 10px #00ffaa;
  }
  /* Grafica speciale per le Macro e tasti funzione */
  .macro-cell { color: #00e5ff; font-size: 10px; }
  .fn-cell { color: #ff3b3b; }

  @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.6; } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="chat-container">
  <div id="status-bar" class="state-ready">
    <div class="dot"></div>
    <span id="status-text">MODALITÀ MATRICE: SCELTA RIGA</span>
  </div>

  <div id="display-box">
    <div class="bubble ai"><strong>IA:</strong> Sistema Matrix caricato. Scegli la riga con le frecce, premi Invio per sbloccare le lettere.</div>
  </div>

  <div class="neural-matrix-zone">
    <div id="text-preview">Scrivi con i gesti...</div>
    <div class="matrix-grid" id="grid-container">
      </div>
  </div>
</div>

<script>
  const displayBox = document.getElementById('display-box');
  const statusBar = document.getElementById('status-bar');
  const statusText = document.getElementById('status-text');
  const textPreview = document.getElementById('text-preview');
  const gridContainer = document.getElementById('grid-container');
  
  let isThinking = false;
  let chatHistory = [];
  let currentText = "";

  // Griglia 6x6 ottimizzata. 
  // Riga 0: Macro rapide per non digitare mai le intere domande d'avvio.
  // Righe successive: Lettere ordinate per frequenza in italiano + comandi di controllo.
  const matrix = [
    ["METEO ", "CHI È ", "COS'È ", "NEWS ", "DOV'È ", "PERCHÉ "],
    ["E", "A", "I", "O", "U", " "],
    ["L", "N", "R", "S", "T", "C"],
    ["D", "P", "M", "V", "G", "B"],
    ["F", "H", "Q", "Z", "X", "Y"],
    ["K", "J", "?", ".", "⌫ CANCELLA", "🚀 INVIA"]
  ];

  let currentRow = 0;
  let currentCol = -1; // -1 significa "Siamo in modalità selezione Riga"

  // Genera la griglia visiva nell'HUD
  function renderMatrix() {
    gridContainer.innerHTML = "";
    matrix.forEach((rowData, rIdx) => {
      const rowDiv = document.createElement('div');
      rowDiv.className = `matrix-row ${rIdx === currentRow ? 'row-focused' : ''}`;
      
      rowData.forEach((cellData, cIdx) => {
        const cellDiv = document.createElement('div');
        cellDiv.className = 'matrix-cell';
        
        // Assegna classi di colore per identificare i tasti a colpo d'occhio
        if (rIdx === 0) cellDiv.classList.add('macro-cell');
        if (cellData.includes('⌫') || cellData.includes('🚀')) cellDiv.classList.add('fn-cell');
        
        if (rIdx === currentRow && cIdx === currentCol) {
          cellDiv.classList.add('cell-focused');
        }
        
        cellDiv.textContent = cellData === " " ? "␣" : cellData;
        rowDiv.appendChild(cellDiv);
      });
      gridContainer.appendChild(rowDiv);
    });
  }

  // ==========================================================
  // LOGICA DI NAVIGAZIONE BINFASE (RIGA -> COLONNA)
  // ==========================================================
  window.addEventListener('keydown', (e) => {
    if (isThinking) return;

    // GESTO ESCAPE (Freccia Su o Giù): se ti blocchi dentro una riga, esci e torni a scegliere le righe
    if (e.key === "ArrowUp" || e.key === "ArrowDown") {
      currentCol = -1;
      statusText.textContent = "MODALITÀ MATRICE: SCELTA RIGA";
      renderMatrix();
      return;
    }

    if (currentCol === -1) {
      // --- STATO 1: SELEZIONE DELLA RIGA ---
      if (e.key === "ArrowLeft") {
        currentRow = (currentRow - 1 + matrix.length) % matrix.length;
        renderMatrix();
      } else if (e.key === "ArrowRight") {
        currentRow = (currentRow + 1) % matrix.length;
        renderMatrix();
      } else if (e.key === "Enter") {
        // Conferma riga, passa alla selezione della colonna (partendo dalla prima cella)
        currentCol = 0;
        statusText.textContent = "MODALITÀ MATRICE: SCELTA LETTERA";
        renderMatrix();
      }
    } else {
      // --- STATO 2: SELEZIONE DELLA CELLA (DENTRO LA RIGA) ---
      if (e.key === "ArrowLeft") {
        currentCol = (currentCol - 1 + matrix[currentRow].length) % matrix[currentRow].length;
        renderMatrix();
      } else if (e.key === "ArrowRight") {
        currentCol = (currentCol + 1) % matrix[currentRow].length;
        renderMatrix();
      } else if (e.key === "Enter") {
        // Scelta effettuata! Estrai il valore della cella
        const val = matrix[currentRow][currentCol];
        
        if (val === "⌫ CANCELLA") {
          currentText = currentText.slice(0, -1);
        } else if (val === "🚀 INVIA") {
          if (currentText.trim() !== "" && currentText !== "Scrivi con i gesti...") {
            sendToAI(currentText);
            currentText = "";
          }
        } else {
          if (currentText === "Scrivi con i gesti...") currentText = "";
          currentText += val;
        }
        
        textPreview.textContent = currentText || "Scrivi con i gesti...";
        textPreview.scrollTop = textPreview.scrollHeight; // Auto scroll del testo

        // Torna istantaneamente alla selezione della riga per la prossima lettera
        currentCol = -1;
        statusText.textContent = "MODALITÀ MATRICE: SCELTA RIGA";
        renderMatrix();
      }
    }
  });

  renderMatrix();

  // Logica API Pollinations con Ricerca Web Attiva
  function appendBubble(sender, text) {
    chatHistory.push({ sender: sender, text: text });
    const bubble = document.createElement('div');
    bubble.className = `bubble ${sender}`;
    bubble.innerHTML = sender === 'user' ? text : `<strong>IA:</strong> ${text}`;
    displayBox.appendChild(bubble);
    setTimeout(() => { displayBox.scrollTop = displayBox.scrollHeight; }, 50);
  }

  async function sendToAI(promptText) {
    isThinking = true;
    statusBar.className = "state-thinking";
    statusText.textContent = "RICERCA IN CORSO...";
    appendBubble('user', promptText);

    const systemPrompt = "Sei un assistente HUD per occhiali smart. Rispondi in italiano. Usa la ricerca web attiva. Sii conciso (max due frasi brevi). Solo testo semplice.";
    
    try {
      const url = `https://text.pollinations.ai/${encodeURIComponent(promptText)}?search=true&model=openai&system=${encodeURIComponent(systemPrompt)}`;
      const response = await fetch(url);
      let reply = (await response.text()).trim();

      if (reply.startsWith('{')) {
        try { const j = JSON.parse(reply); if(j.content) reply = j.content; } catch(e){}
      }

      appendBubble('ai', reply);
    } catch (e) {
      appendBubble('ai', 'Errore di connessione. Riprova.');
    }

    isThinking = false;
    statusBar.className = "state-ready";
    statusText.textContent = "MODALITÀ MATRICE: SCELTA RIGA";
  }
</script>
</body>
</html>
